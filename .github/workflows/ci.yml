name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Vite 7 requires Node 20.19+ / 22.12+ — pin to 22 (current LTS).
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Non-blocking for now: the repo has a few pre-existing lint errors
      # (Nav.tsx, Button.tsx). Fix those, then drop continue-on-error to make
      # lint a required gate.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
